<!DOCTYPE html>
<html lang="en" data-sensory="balanced">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sensory Lab v3 — Anti-Pasteurization</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- OS Frame: the entire viewport is a desktop environment -->
  <div class="os-frame">

    <!-- Chaos Layer: generative wallpaper, danmaku, particles — pointer-events: none -->
    <div class="chaos-layer" aria-hidden="true">
      <canvas id="wallpaper" class="wallpaper-canvas"></canvas>
      <div id="danmaku" class="danmaku-stream" aria-hidden="true"></div>
    </div>

    <!-- Desktop: content area, widgets live here -->
    <main class="desktop" id="desktop" data-mode="balanced">

      <!-- Widget: Sensory Profile Card (the constructionist artifact) -->
      <article class="widget profile-card" id="widget-profile"
             aria-label="Sensory Profile Card — build your sensory signature">
        <header class="widget-titlebar" data-drag-handle>
          <span class="widget-title">Profile Card</span>
          <div class="widget-actions">
            <button class="widget-btn widget-capture" aria-label="Download PNG" title="Capture">⬇</button>
            <button class="widget-btn widget-share" aria-label="Copy share URL" title="Share">🔗</button>
          </div>
        </header>
        <div class="widget-body">
          <canvas id="profile-output" class="profile-canvas" aria-label="Generative visual output reacting to your parameters"></canvas>
          <div class="profile-controls">
            <label class="slider-row">
              <span>Saturation</span>
              <input type="range" id="param-saturation" min="0" max="2" step="0.01" value="1.0">
            </label>
            <label class="slider-row">
              <span>Motion</span>
              <input type="range" id="param-motion" min="0" max="2" step="0.01" value="0.5">
            </label>
            <label class="slider-row">
              <span>Contrast</span>
              <input type="range" id="param-contrast" min="0" max="2" step="0.01" value="1.0">
            </label>
            <label class="slider-row">
              <span>Noise Grain</span>
              <input type="range" id="param-noise" min="0" max="1" step="0.01" value="0.15">
            </label>
            <label class="slider-row">
              <span>Beat Response</span>
              <input type="range" id="param-beat" min="0" max="2" step="0.01" value="0.5">
            </label>
            <label class="slider-row">
              <span>Cursor Trail</span>
              <input type="range" id="param-trail" min="0" max="2" step="0.01" value="0.5">
            </label>
          </div>
        </div>
      </article>

      <!-- Widget: Focus Anchor (disabled — MVP phase 3) -->
      <!-- <article class="widget" id="widget-focus">...</article> -->

      <!-- Widget: Signal Desk (disabled — MVP phase 3) -->
      <!-- <article class="widget" id="widget-signals">...</article> -->

    </main>

    <!-- Dock: floating action layer — mode controls, constructor, system -->
    <nav class="dock" id="dock" aria-label="Sensory controls">
      <div class="dock-group dock-modes">
        <button class="dock-btn active" data-mode="high-stim" aria-label="High Stim mode" title="High Stim">⚡</button>
        <button class="dock-btn" data-mode="balanced" aria-label="Balanced mode" title="Balanced">⚖️</button>
        <button class="dock-btn" data-mode="calm" aria-label="Calm mode" title="Calm">🌿</button>
      </div>
      <div class="dock-divider" aria-hidden="true"></div>
      <div class="dock-group dock-actions">
        <button class="dock-btn" id="btn-randomize" aria-label="Randomize parameters" title="Randomize">🎲</button>
        <button class="dock-btn" id="btn-reset" aria-label="Reset to defaults" title="Reset">↺</button>
      </div>
    </nav>

  </div>

  <script src="app.js"></script>
</body>
</html>
